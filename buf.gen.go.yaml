version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/forgetaboutitapp/forget-about-it/server/protobufs-build
plugins:
  - local: [go, tool, -C, ../forget-about-it/server, protoc-gen-go]
    out: ../forget-about-it/server/protobufs-build
    opt:
      - paths=source_relative
  - local: [go, tool, -C, ../forget-about-it/server, protoc-gen-connect-go]
    out: ../forget-about-it/server/protobufs-build
    opt:
      - paths=source_relative
      - simple
inputs:
  - directory: .
